# ----------------------------------------------------------------------
# Spam Filter Configuration
# ----------------------------------------------------------------------

# DO NOT CHANGE VERSION
version: 2

# The amount of time (in seconds) a player must wait between sending messages.
message-cooldown-seconds: 2.0

# The message sent to the player when they send messages too quickly.
# MUST be in MiniMessage formatting.
# OPTIONAL PLACEHOLDER:
# <remaining> - The amount of time left (in seconds) before the player can speak again. E.g. "2.0"
cancel-message: "<red><bold>!</bold> Please wait <remaining>s before chatting again.</red>"

database-logging:
  log-infractions: true